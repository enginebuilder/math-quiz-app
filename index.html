<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Grade 2 Math Challenge</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f3f6fb;
      margin: 0;
      padding: 20px;
      color: #222;
    }

    .container {
      max-width: 900px;
      margin: auto;
      background: white;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.1);
    }

    h1 {
      text-align: center;
      margin-bottom: 10px;
    }

    .subtitle {
      text-align: center;
      color: #666;
      margin-bottom: 30px;
    }

    .question-card {
      border: 1px solid #ddd;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
      background: #fafafa;
    }

    .question-title {
      font-size: 1.1rem;
      font-weight: bold;
      margin-bottom: 14px;
      line-height: 1.5;
    }

    .choices {
      display: grid;
      gap: 10px;
    }

    .choice {
      padding: 12px;
      border: 1px solid #ccc;
      border-radius: 8px;
      background: white;
      cursor: pointer;
      transition: 0.2s;
    }

    .choice:hover {
      background: #eef5ff;
      border-color: #2563eb;
    }

    .choice.correct {
      background: #dcfce7;
      border-color: #16a34a;
    }

    .choice.incorrect {
      background: #fee2e2;
      border-color: #dc2626;
    }

    .controls {
      text-align: center;
      margin-top: 30px;
    }

    button {
      padding: 14px 24px;
      border: none;
      border-radius: 10px;
      background: #2563eb;
      color: white;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #1d4ed8;
    }

    .score {
      margin-top: 24px;
      text-align: center;
      font-size: 1.4rem;
      font-weight: bold;
    }

    @media (max-width: 600px) {
      .container {
        padding: 16px;
      }
    }
  </style>
</head>

<body>

<div class="container">
  <h1>Grade 2 Math Challenge</h1>

  <div class="subtitle">
    Interactive practice questions inspired by math contest puzzles
  </div>

  <div id="quiz"></div>

  <div class="controls">
    <button onclick="gradeQuiz()">Check Answers</button>
  </div>

  <div class="score" id="score"></div>
</div>

<script>

const questions = [
{
question: "1. Mason has shelves with 2, 4, 6, and 8 toy cars. How many cars altogether?",
choices: ["18", "20", "22", "24"],
answer: "20"
},
{
question: "2. A bakery packs cookies into boxes of 5. If there are 23 cookies, how many full boxes can be made?",
choices: ["3", "4", "5", "6"],
answer: "4"
},
{
question: "3. Ella finished the race 3 minutes after Noah. Noah finished at 2:14 PM. What time did Ella finish?",
choices: ["2:11 PM", "2:14 PM", "2:17 PM", "2:20 PM"],
answer: "2:17 PM"
},
{
question: "4. Three blocks weigh 18 pounds together. How much does one block weigh?",
choices: ["3", "6", "9", "12"],
answer: "6"
},
{
question: "5. Apples cost $2 each and bananas cost $1 each. Lena buys 3 apples and 4 bananas. How much does she spend?",
choices: ["$7", "$8", "$9", "$10"],
answer: "$10"
},
{
question: "6. What comes next? 5, 10, 15, 20, ___",
choices: ["22", "24", "25", "30"],
answer: "25"
},
{
question: "7. There are 24 children. 14 play soccer. 10 are girls and 6 girls play soccer. How many boys play soccer?",
choices: ["6", "7", "8", "9"],
answer: "8"
},
{
question: "8. A ribbon is 30 inches long. Sara cuts 8, 7, and 5 inches. How many inches remain?",
choices: ["8", "9", "10", "11"],
answer: "10"
},
{
question: "9. A school bus stops every 10 minutes from 8:00 AM to 9:00 AM inclusive. How many stops are there?",
choices: ["5", "6", "7", "8"],
answer: "7"
},
{
question: "10. There are 3 dogs and 2 chickens. How many legs altogether?",
choices: ["12", "14", "16", "18"],
answer: "16"
},
{
question: "11. A 4×4 grid is missing stars in one row. What is the fewest stars needed so every row has a star?",
choices: ["1", "2", "3", "4"],
answer: "1"
},
{
question: "12. Jay read 12 pages Monday, 15 Tuesday, and 9 Wednesday. Total pages?",
choices: ["34", "35", "36", "37"],
answer: "36"
},
{
question: "13. 20 crayons are shared equally among 4 children. How many crayons each?",
choices: ["4", "5", "6", "7"],
answer: "5"
},
{
question: "14. A train has 1 engine, 7 passenger cars, and 2 cargo cars. Total cars?",
choices: ["8", "9", "10", "11"],
answer: "10"
},
{
question: "15. I am thinking of a number greater than 20, less than 25, and even.",
choices: ["21", "22", "23", "25"],
answer: "22"
},
{
question: "16. Ava is 7th in line and 5 children are behind her. How many children altogether?",
choices: ["11", "12", "13", "14"],
answer: "12"
},
{
question: "17. Two nickels and three pennies are worth:",
choices: ["11¢", "12¢", "13¢", "15¢"],
answer: "13¢"
},
{
question: "18. A cube has 8 corners. If 2 corners are covered, how many can still be seen?",
choices: ["4", "5", "6", "8"],
answer: "6"
},
{
question: "19. Each table seats 4 children. If 18 children come, how many tables are needed?",
choices: ["3", "4", "5", "6"],
answer: "5"
},
{
question: "20. What number makes this true? 9 + ___ = 16",
choices: ["5", "6", "7", "8"],
answer: "7"
}
];

const quizContainer = document.getElementById("quiz");

questions.forEach((q, index) => {

  const card = document.createElement("div");
  card.className = "question-card";

  let choicesHTML = "";

  q.choices.forEach(choice => {
    choicesHTML += `
      <label class="choice">
        <input type="radio" name="q${index}" value="${choice}">
        ${choice}
      </label>
    `;
  });

  card.innerHTML = `
    <div class="question-title">${q.question}</div>
    <div class="choices">${choicesHTML}</div>
  `;

  quizContainer.appendChild(card);
});

function gradeQuiz() {

  let score = 0;

  questions.forEach((q, index) => {

    const selected = document.querySelector(`input[name="q${index}"]:checked`);
    const labels = document.querySelectorAll(`input[name="q${index}"]`);

    labels.forEach(input => {
      input.parentElement.classList.remove("correct", "incorrect");

      if (input.value === q.answer) {
        input.parentElement.classList.add("correct");
      }
    });

    if (selected) {
      if (selected.value === q.answer) {
        score++;
      } else {
        selected.parentElement.classList.add("incorrect");
      }
    }
  });

  document.getElementById("score").innerText =
    `You scored ${score} out of ${questions.length}`;
}

</script>

</body>
</html>
